kind = "web"
previewPath = "/"
title = "WebForge"
version = "1.0.0"
id = "artifacts/webforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18941

[services.development]
run = "pnpm --filter @workspace/webforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/webforge", "run", "build" ]
publicDir = "artifacts/webforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18941"
BASE_PATH = "/"
